<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V45ストラップカラー検索</title>

<style>
body { font-family: sans-serif; padding: 20px; }
input, select { padding: 8px; font-size: 16px; margin: 5px 0; width: 300px; }
.item { border: 1px solid #ccc; padding: 10px; margin: 10px 0; display: flex; gap: 20px; }
.item img { width: 150px; height: auto; cursor: pointer; }
.label { font-weight: bold; margin-top: 10px; }

/* スマホ最適化 */
@media (max-width: 600px) {
    .item {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    input, select {
        width: 100%;
        max-width: 100%;
    }
    .item img {
        width: 80%;
        max-width: 250px;
    }
}

/* 拡大画像モーダル */
#modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index: 9999;
}
#modalImg {
    max-width:90%;
    max-height:90%;
    border:5px solid white;
}
</style>

<script src="data.js"></script>
</head>
<body>

<h1>V45ストラップカラー検索</h1>

<!-- クロコ色系統 -->
<div class="label">クロコの色系統</div>
<select id="groupCroco">
    <option value="">指定なし</option>
    <option value="黒系">黒系</option>
    <option value="青系">青系</option>
    <option value="白系">白系</option>
    <option value="黄色系">黄色系</option>
    <option value="赤系">赤系</option>
    <option value="オレンジ系">オレンジ系</option>
    <option value="緑系">緑系</option>
    <option value="パープル系">パープル系</option>
    <option value="茶系">茶系</option>
    <option value="グレー系">グレー系</option>
</select>

<!-- ラバー色系統 -->
<div class="label">ラバーの色系統</div>
<select id="groupRubber">
    <option value="">指定なし</option>
    <option value="黒系">黒系</option>
    <option value="青系">青系</option>
    <option value="白系">白系</option>
    <option value="黄色系">黄色系</option>
    <option value="赤系">赤系</option>
    <option value="オレンジ系">オレンジ系</option>
    <option value="緑系">緑系</option>
    <option value="パープル系">パープル系</option>
    <option value="茶系">茶系</option>
    <option value="グレー系">グレー系</option>
</select>

<!-- ステッチ色系統 -->
<div class="label">ステッチの色系統</div>
<select id="groupStitch">
    <option value="">指定なし</option>
    <option value="黒系">黒系</option>
    <option value="青系">青系</option>
    <option value="白系">白系</option>
    <option value="黄色系">黄色系</option>
    <option value="赤系">赤系</option>
    <option value="オレンジ系">オレンジ系</option>
    <option value="緑系">緑系</option>
    <option value="パープル系">パープル系</option>
    <option value="茶系">茶系</option>
    <option value="グレー系">グレー系</option>
    <option value="金系">金系</option>
</select>

<!-- 部分一致検索 -->
<div class="label">部分一致検索（クロコ・ラバー・ステッチ）</div>
<input id="search" placeholder="例：紺、白、黒ラバー など">

<div id="result"></div>

<!-- 拡大画像モーダル -->
<div id="modal">
    <img id="modalImg">
</div>

<script>
function render(list) {
    const box = document.getElementById("result");
    box.innerHTML = "";

    list.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        const img = document.createElement("img");
        img.src = "./images/" + item.画像[0];

        // クリックで拡大
        img.addEventListener("click", () => {
            document.getElementById("modalImg").src = img.src;
            document.getElementById("modal").style.display = "flex";
        });

        const info = document.createElement("div");
        info.innerHTML = `
            <b>${item.品番}</b><br>
            クロコ：${item.色.クロコ}<br>
            ラバー：${item.色.ラバー}<br>
            ステッチ：${item.色.ステッチ}<br>
            ${item.備考 ? `備考：${item.備考}<br>` : ""}
        `;

        div.appendChild(img);
        div.appendChild(info);
        box.appendChild(div);
    });
}

function search() {
    const word = document.getElementById("search").value;

    const gCroco  = document.getElementById("groupCroco").value;
    const gRubber = document.getElementById("groupRubber").value;
    const gStitch = document.getElementById("groupStitch").value;

    let hit = DATA;

    if (gCroco !== "") hit = hit.filter(item => item.色グループ.クロコ === gCroco);
    if (gRubber !== "") hit = hit.filter(item => item.色グループ.ラバー === gRubber);
    if (gStitch !== "") hit = hit.filter(item => item.色グループ.ステッチ === gStitch);

    if (word !== "") {
        hit = hit.filter(item =>
            item.色.クロコ.includes(word) ||
            item.色.ラバー.includes(word) ||
            item.色.ステッチ.includes(word)
        );
    }

    render(hit);
}

document.getElementById("search").addEventListener("input", search);
document.getElementById("groupCroco").addEventListener("change", search);
document.getElementById("groupRubber").addEventListener("change", search);
document.getElementById("groupStitch").addEventListener("change", search);

// モーダルクリックで閉じる
document.getElementById("modal").addEventListener("click", () => {
    document.getElementById("modal").style.display = "none";
});

// 初期表示
render(DATA);
</script>

</body>
</html>
