<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V45ストラップカラー検索</title>

<style>
body { font-family:sans-serif; padding:20px; }

.title { text-align:center; white-space:nowrap; }
.title::before,.title::after { content:"★"; color:#d4af37; margin:0 8px; }

/* ===== 注意文 ===== */
.notice {
  margin:10px 0 20px;
  padding:12px;
  border:1px solid #1e88e5;
  background:#e3f2fd;
  color:#1565c0;
  border-radius:6px;
  font-size:14px;
  line-height:1.6;
}
.notice-sub { padding-left:2em; }

/* ===== UI ===== */
.label { font-weight:bold; margin-top:14px; }
.label-note { font-size:12px; color:#666; margin-left:6px; }

input,select { padding:8px; font-size:16px; width:300px; }

.search-controls { display:flex; gap:10px; flex-wrap:wrap; }
.cancel-btn {
  padding:8px 14px;
  border:1px solid #999;
  background:#f5f5f5;
  border-radius:4px;
  cursor:pointer;
}

/* ===== パレット ===== */
.palette { display:flex; flex-wrap:wrap; gap:10px; margin:8px 0 16px; }
.color-chip {
  width:34px; height:34px;
  border-radius:50%;
  border:2px solid #ccc;
  cursor:pointer;
}
.color-chip.selected { border:3px solid #000; }

/* ===== 色 ===== */
.color-黒系{background:#000}
.color-青系{background:#1976d2}
.color-白系{background:#fff;border:2px solid #999}
.color-黄系{background:#fdd835}
.color-赤系{background:#d32f2f}
.color-オレンジ系{background:#f57c00}
.color-緑系{background:#388e3c}
.color-パープル系{background:#7b1fa2}
.color-茶系{background:#6d4c41}
.color-グレー系{background:#9e9e9e}

/* ===== 金系（メタリック） ===== */
.color-金系{
  background:
    radial-gradient(circle at 28% 25%,
      rgba(255,255,255,.95) 0%,
      rgba(255,255,255,.55) 12%,
      rgba(255,255,255,0) 32%
    ),
    linear-gradient(135deg,
      #fff7c7 0%,
      #f7e27e 18%,
      #d4af37 40%,
      #b08a1e 55%,
      #f7e27e 72%,
      #fff1a6 100%
    );
  border:2px solid #7a5f12;
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.75),
    inset 0 -2px 3px rgba(0,0,0,.25),
    0 1px 3px rgba(0,0,0,.35);
}

/* ===== 結果 ===== */
.item {
  border:1px solid #ccc;
  padding:10px;
  margin:10px 0;
  display:flex;
  gap:20px;
}
.item img { width:150px; cursor:pointer; }
.note { font-size:13px; color:#555; }

/* ===== モーダル ===== */
#modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  justify-content:center;
  align-items:center;
}
#modalImg { max-width:90%; max-height:90%; border:5px solid #fff; }
</style>

<script src="data.js"></script>
</head>

<body>

<h1 class="title">V45ストラップカラー検索</h1>

<div class="notice">
  <div>今まで入荷してきたベルト（在庫外含む）の色を検索できます。</div>
  <div class="notice-sub">注1：特注は除く</div>
  <div class="notice-sub">注2：すでに在庫のないカラーがあります</div>
  <div class="notice-sub">注3：色見本として参考にしてください</div>
</div>

<div class="label">素材カテゴリ</div>
<select id="category">
  <option value="">指定なし</option>
  <option value="CROCORUBBER">CROCORUBBER</option>
  <option value="CALFRUBBER">CALFRUBBER</option>
  <option value="SUEDERUBBER">SUEDERUBBER</option>
  <option value="FABRICRUBBER">FABRICRUBBER</option>
  <option value="CAUCHU">CAUCHU</option>
</select>

<div class="label">素材1（表）の色系統検索</div>
<div class="palette" id="pMat1"></div>
<input type="hidden" id="groupMaterial1">

<div class="label">素材2（裏）の色系統検索<span class="label-note">※素材として茶カーフ含</span></div>
<div class="palette" id="pMat2"></div>
<input type="hidden" id="groupMaterial2">

<div class="label">ステッチの色系統検索</div>
<div class="palette" id="pStitch"></div>
<input type="hidden" id="groupStitch">

<div class="label">部分一致検索</div>
<div class="search-controls">
  <input id="search" placeholder="例：GOLF用、限定、使用不可 など">
  <button class="cancel-btn" id="cancelBtn">検索キャンセル</button>
</div>

<div id="count"></div>
<div id="result"></div>

<div id="modal"><img id="modalImg"></div>

<script>
(() => {
  const COLORS_MAIN = ["黒系","青系","白系","黄系","赤系","オレンジ系","緑系","パープル系","茶系","グレー系"];
  const COLORS_STITCH = [...COLORS_MAIN, "金系"];
  const el = id => document.getElementById(id);

  function build(pid, hid, colors){
    const box = el(pid), hidden = el(hid);
    colors.forEach(c=>{
      const d = document.createElement("div");
      d.className = `color-chip color-${c}`;
      d.title = c; // ✅ ホバーで色名表示
      d.onclick = () => {
        hidden.value = hidden.value === c ? "" : c;
        [...box.children].forEach(x=>x.classList.remove("selected"));
        if(hidden.value) d.classList.add("selected");
        search();
      };
      box.appendChild(d);
    });
  }

  build("pMat1","groupMaterial1", COLORS_MAIN);
  build("pMat2","groupMaterial2", COLORS_MAIN);
  build("pStitch","groupStitch", COLORS_STITCH);

  function search(){
    let hit = DATA;

    if(el("category").value)
      hit = hit.filter(i=>i.カテゴリ===el("category").value);

    if(el("groupMaterial1").value)
      hit = hit.filter(i=>i.色グループ.素材1.includes(el("groupMaterial1").value));

    if(el("groupMaterial2").value)
      hit = hit.filter(i=>i.色グループ.素材2.includes(el("groupMaterial2").value));

    if(el("groupStitch").value)
      hit = hit.filter(i=>i.色グループ.ステッチ.includes(el("groupStitch").value));

    if(el("search").value.trim()){
      const w = el("search").value.trim();
      hit = hit.filter(i =>
        i.色.素材1.includes(w) ||
        i.色.素材2.includes(w) ||
        (i.色.ステッチ||"").includes(w) ||
        (i.備考||"").includes(w)
      );
    }

    el("count").textContent = `検索結果：${hit.length} 件`;

    el("result").innerHTML = hit.map(i => `
      <div class="item">
        <img src="./images/${i.画像[0]}" onclick="openModal('${i.画像[0]}')">
        <div>
          <b>${i.品番}</b><br>
          表：${i.色.素材1}<br>
          裏：${i.色.素材2}<br>
          ステッチ：${i.色.ステッチ || "なし"}<br>
          ${i.備考 ? `<div class="note">備考：${i.備考.replace(/※/g,"<br>※")}</div>` : ""}
        </div>
      </div>
    `).join("");
  }

  window.openModal = src => {
    el("modalImg").src = "./images/" + src;
    el("modal").style.display = "flex";
  };
  el("modal").onclick = () => el("modal").style.display = "none";

  el("category").onchange = search;
  el("search").oninput = search;
  el("cancelBtn").onclick = () => location.reload();

  search();
})();
</script>

</body>
</html>
