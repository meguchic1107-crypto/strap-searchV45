<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V45ストラップカラー検索</title>

<style>
body { font-family:sans-serif; padding:20px; }

/* ===== タイトル ===== */
.title { text-align:center; white-space:nowrap; }
.title::before,.title::after {
  content:"★"; color:#d4af37; margin:0 8px;
}

/* ===== 注意 ===== */
.notice {
  margin:10px 0 20px;
  padding:10px;
  border:1px solid #1e88e5;
  background:#e3f2fd;
  color:#1565c0;
  border-radius:6px;
  font-size:14px;
}
.notice-line2 { padding-left:3.5em; }

/* ===== UI ===== */
.label { font-weight:bold; margin-top:14px; }
input,select {
  padding:8px;
  font-size:16px;
  width:300px;
}

/* ===== 検索コントロール ===== */
.search-controls {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.cancel-btn {
  padding:8px 14px;
  font-size:14px;
  cursor:pointer;
  border:1px solid #999;
  background:#f5f5f5;
  border-radius:4px;
}
.cancel-btn:hover { background:#e0e0e0; }

/* ===== カラーパレット ===== */
.palette { display:flex; flex-wrap:wrap; gap:10px; margin:8px 0 16px; }
.color-chip {
  width:34px; height:34px; border-radius:50%;
  border:2px solid #ccc; cursor:pointer; position:relative;
}
.color-chip.selected { border:3px solid #000; }
.color-chip.selected::after {
  content:"✓";
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-weight:bold;
}

/* ===== 色 ===== */
.color-黒系{background:#000}
.color-青系{background:#1976d2}
.color-白系{background:#fff;border:2px solid #999}
.color-黄系{background:#fdd835}
.color-赤系{background:#d32f2f}
.color-オレンジ系{background:#f57c00}
.color-緑系{background:#388e3c}
.color-パープル系{background:#7b1fa2}
.color-茶系{background:#6d4c41}
.color-グレー系{background:#9e9e9e}

/* ===== 金系（きらっと＋縁取り） ===== */
.color-金系{
  background:
    radial-gradient(circle at 30% 30%,
      #fff9d6 0%,
      rgba(255,249,214,0.9) 18%,
      transparent 35%
    ),
    linear-gradient(
      135deg,
      #fff3b0 0%,
      #f6d97a 25%,
      #d4af37 50%,
      #b8962e 65%,
      #f6d97a 85%,
      #fff3b0 100%
    );
  border:2px solid #8c7422;
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,0.85),
    inset 0 -2px 3px rgba(0,0,0,0.25),
    0 1px 3px rgba(0,0,0,0.4);
}

/* ===== 無効化 ===== */
.palette.disabled { pointer-events:none; opacity:0.4; }

/* ===== 結果 ===== */
.item {
  border:1px solid #ccc;
  padding:10px;
  margin:10px 0;
  display:flex;
  gap:20px;
}
.item img { width:150px; cursor:pointer; }
.note { font-size:13px; color:#555; }

/* ===== モーダル ===== */
#modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  justify-content:center;
  align-items:center;
}
#modalImg {
  max-width:90%;
  max-height:90%;
  border:5px solid #fff;
}

@media(max-width:600px){
  input,select{width:100%}
  .item{flex-direction:column;align-items:center}
}
</style>

<!-- ✅ data.js を正しく読み込む -->
<script src="data.js"></script>
</head>

<body>

<h1 class="title">V45ストラップカラー検索</h1>

<div class="notice">
  <div>注：在庫のないカラーがある場合があります</div>
  <div class="notice-line2">色見本の参考にしてください</div>
</div>

<div class="label">素材カテゴリ</div>
<select id="category">
  <option value="">指定なし</option>
  <option value="CROCORUBBER">CROCORUBBER</option>
  <option value="CALFRUBBER">CALFRUBBER</option>
  <option value="SUEDERUBBER">SUEDERUBBER</option>
  <option value="FABRICRUBBER">FABRICRUBBER</option>
  <option value="CAUCHU">CAUCHU</option>
</select>

<div class="label">素材1（表）の色系統</div>
<div class="palette" id="pMat1"></div>
<input type="hidden" id="groupMaterial1">

<div class="label">素材2（裏）の色系統</div>
<div class="palette" id="pMat2"></div>
<input type="hidden" id="groupMaterial2">

<div class="label">ステッチの色系統</div>
<div class="palette" id="pStitch"></div>
<input type="hidden" id="groupStitch">

<div class="label">部分一致検索</div>
<div class="search-controls">
  <input id="search" placeholder="例：GOLF用、限定、在庫外、使用不可 など">
  <button type="button" class="cancel-btn" id="cancelBtn">検索キャンセル</button>
</div>

<div id="count"></div>
<div id="result"></div>

<div id="modal"><img id="modalImg"></div>

<script>
(() => {
  const COLORS_MAIN = ["黒系","青系","白系","黄系","赤系","オレンジ系","緑系","パープル系","茶系","グレー系"];
  const COLORS_STITCH = [...COLORS_MAIN,"金系"];
  const el = id => document.getElementById(id);

  function buildPalette(pid,hid,colors){
    const box=el(pid), hidden=el(hid);
    colors.forEach(c=>{
      const d=document.createElement("div");
      d.className=`color-chip color-${c}`;
      d.title=c;
      d.onclick=()=>{
        hidden.value = hidden.value === c ? "" : c;
        [...box.children].forEach(x=>x.classList.remove("selected"));
        if(hidden.value) d.classList.add("selected");
        search();
      };
      box.appendChild(d);
    });
  }

  buildPalette("pMat1","groupMaterial1",COLORS_MAIN);
  buildPalette("pMat2","groupMaterial2",COLORS_MAIN);
  buildPalette("pStitch","groupStitch",COLORS_STITCH);

  function updateByCategory(){
    const isC=el("category").value==="CAUCHU";
    const p=el("pStitch"), h=el("groupStitch");
    if(isC){
      p.classList.add("disabled");
      h.value="";
      p.querySelectorAll(".color-chip").forEach(c=>c.classList.remove("selected"));
    } else {
      p.classList.remove("disabled");
    }
  }

  const includesMatch=(v,t)=>typeof v==="string" && v.includes(t);

  function isBlueRescue(i, sel){
    return sel==="青系" &&
           i.色グループ.素材1==="未分類" &&
           /青|ブルー|ターコイズ|ミント/i.test(i.色.素材1);
  }

  function clearAll(){
    el("category").value="";
    el("search").value="";
    ["groupMaterial1","groupMaterial2","groupStitch"].forEach(id=>el(id).value="");
    document.querySelectorAll(".color-chip").forEach(c=>c.classList.remove("selected"));
    updateByCategory();
    search();
  }

  function search(){
    let hit=DATA;

    if(el("category").value)
      hit=hit.filter(i=>i.カテゴリ===el("category").value);

    if(el("groupMaterial1").value){
      const sel=el("groupMaterial1").value;
      hit=hit.filter(i=>includesMatch(i.色グループ.素材1, sel) || isBlueRescue(i, sel));
    }

    if(el("groupMaterial2").value)
      hit=hit.filter(i=>includesMatch(i.色グループ.素材2, el("groupMaterial2").value));

    if(el("groupStitch").value)
      hit=hit.filter(i=>includesMatch(i.色グループ.ステッチ, el("groupStitch").value));

    if(el("search").value.trim()){
      const w=el("search").value.trim();
      hit=hit.filter(i =>
        i.色.素材1.includes(w) ||
        i.色.素材2.includes(w) ||
        (i.色.ステッチ && i.色.ステッチ.includes(w)) ||
        (i.備考 && i.備考.includes(w))
      );
    }

    el("count").textContent=`検索結果：${hit.length} 件`;

    el("result").innerHTML = hit.map(i=>{
      const noteHtml = i.備考
        ? `<div class="note">備考：${String(i.備考).replace(/※/g,"<br>※")}</div>`
        : "";
      return `
        <div class="item">
          <img src="./images/${i.画像[0]}" onclick="openModal('${i.画像[0]}')">
          <div>
            <b>${i.品番}</b><br>
            表：${i.色.素材1}<br>
            裏：${i.色.素材2}<br>
            ステッチ：${i.色.ステッチ || "なし"}<br>
            ${noteHtml}
          </div>
        </div>
      `;
    }).join("");
  }

  window.openModal = src => {
    el("modalImg").src="./images/"+src;
    el("modal").style.display="flex";
  };
  el("modal").onclick=()=>el("modal").style.display="none";

  el("category").onchange=()=>{updateByCategory();search();};
  document.querySelectorAll("input,select").forEach(e=>e.onchange=search);
  el("cancelBtn").onclick=clearAll;

  updateByCategory();
  search();
})();
</script>

</body>
</html>
