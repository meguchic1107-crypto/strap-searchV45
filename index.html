<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>V45ストラップカラー検索</title>

<style>
body{font-family:sans-serif;padding:20px}
.title{text-align:center}
.title::before,.title::after{content:"★";color:#d4af37;margin:0 8px}

.notice{
  margin:10px 0 20px;padding:12px;
  border:1px solid #1e88e5;background:#e3f2fd;
  border-radius:8px;font-size:14px
}
.notice-sub{padding-left:2em}

.label{font-weight:bold;margin-top:14px}
input,select{padding:8px;font-size:16px;width:300px}
.search-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

.category-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.category-row select{flex:0 1 300px}

.palette-btn,.cancel-btn,.clear-result-btn{
  padding:8px 14px;border-radius:999px;cursor:pointer
}
.palette-btn{
  border:1px solid #90caf9;
  background:linear-gradient(#e3f2fd,#bbdefb);
  font-weight:bold
}
.cancel-btn{border:1px solid #999;background:#f5f5f5}
.clear-result-btn{border:1px solid #b0bec5;background:#eceff1}

.palette{
  display:none;flex-wrap:wrap;gap:10px;
  margin:8px 0;padding:12px;
  background:#fafafa;border:1px solid #eee;border-radius:12px
}
.palette.open{display:flex}

.color-chip{
  width:32px;height:32px;border-radius:50%;
  border:2px solid rgba(0,0,0,.1);
  cursor:pointer;position:relative
}
.color-chip.selected{outline:3px solid #1e88e5}
.color-chip::before{
  content:attr(data-color-name);
  position:absolute;top:-38px;left:50%;
  transform:translateX(-50%);
  background:#000;color:#fff;font-size:12px;
  padding:2px 6px;border-radius:6px;
  opacity:0;pointer-events:none
}
.color-chip.selected::before{opacity:1}

@media (hover: hover) {
  .color-chip:hover::before{opacity:1}
}
@media (hover: none) {
  .color-chip:hover:not(.selected)::before{opacity:0}
}

.color-黒系{background:#000}
.color-青系{background:#1976d2}
.color-白系{background:#fff;border:2px solid #bbb}
.color-黄系{background:#fdd835}
.color-赤系{background:#d32f2f}
.color-オレンジ系{background:#f57c00}
.color-緑系{background:#388e3c}
.color-パープル系{background:#7b1fa2}
.color-茶系{background:#8d6e63}
.color-グレー系{background:#9e9e9e}
.color-金系{background:linear-gradient(135deg,#fff6b0,#d4af37,#b08a1e)}

.result-header{
  display:flex;align-items:center;gap:12px;margin-top:12px
}
#count{font-weight:bold}

.item{border:1px solid #ccc;padding:10px;margin:10px 0;display:flex;gap:20px}
.item img{width:150px;cursor:pointer}

#modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  justify-content:center;align-items:center
}
#modal img{max-width:90%;border:5px solid #fff}
</style>

<script src="data.js"></script>
</head>

<body>

<h1 class="title">V45ストラップカラー検索</h1>

<div class="notice">
  今まで入荷してきたベルト（在庫外含む）の色を検索できます。
</div>

<div class="label">素材カテゴリ</div>
<div class="category-row">
  <select id="category">
    <option value="">指定なし</option>
    <option value="CROCORUBBER">CROCORUBBER</option>
    <option value="CALFRUBBER">CALFRUBBER</option>
  </select>
  <button class="palette-btn" id="paletteBtn">色パレット</button>
</div>

<div class="label">素材1（表）</div>
<div class="palette" id="pMat1"></div>
<input type="hidden" id="groupMaterial1">

<div class="label">部分一致検索</div>
<div class="search-controls">
  <input id="search" placeholder="例：GOLF用、限定など">
  <button class="cancel-btn" id="cancelBtn">キャンセル</button>
</div>

<div class="result-header">
  <div id="count"></div>
  <button class="clear-result-btn" id="clearResultBtn">結果をクリア</button>
</div>

<div id="result"></div>

<div id="modal"><img></div>

<script>
(() => {
const el = id => document.getElementById(id);
const COLORS = ["黒系","青系","白系","黄系","赤系","オレンジ系","緑系","パープル系","茶系","グレー系"];

let paletteOpen = false;

function buildPalette(){
  const box = el("pMat1");
  box.dataset.selected = "[]";
  COLORS.forEach(c=>{
    const d=document.createElement("div");
    d.className=`color-chip color-${c}`;
    d.dataset.colorName=c;
    d.onclick=()=>{
      let s=JSON.parse(box.dataset.selected);
      d.classList.toggle("selected");
      d.classList.contains("selected") ? s.push(c) : s=s.filter(x=>x!==c);
      box.dataset.selected=JSON.stringify(s);
      el("groupMaterial1").value=s.join(",");
      search();
    };
    box.appendChild(d);
  });
}

function search(){
  let hit=DATA;
  if(el("groupMaterial1").value){
    hit=hit.filter(i=>el("groupMaterial1").value.split(",")
      .some(c=>i.色グループ.素材1===c));
  }
  if(el("search").value){
    hit=hit.filter(i=>i.備考?.includes(el("search").value));
  }
  el("count").textContent=`検索結果：${hit.length} 件`;
  el("result").innerHTML=hit.map(i=>`
    <div class="item">
      <img src="./images/${i.画像[0]}" onclick="openModal('${i.画像[0]}')">
      <div><b>${i.品番}</b></div>
    </div>`).join("");
}

el("paletteBtn").onclick=()=>{
  paletteOpen = !paletteOpen;
  el("pMat1").classList.toggle("open",paletteOpen);
  el("paletteBtn").textContent = paletteOpen ? "色パレットを閉じる" : "色パレット";
};

el("cancelBtn").onclick=()=>{
  el("groupMaterial1").value="";
  el("search").value="";
  document.querySelectorAll(".color-chip").forEach(c=>c.classList.remove("selected"));
  search();
};

el("clearResultBtn").onclick=()=>{
  el("result").innerHTML="";
  el("count").textContent="検索結果：0 件";
};

window.openModal=s=>{
  el("modal").style.display="flex";
  el("modal").querySelector("img").src="./images/"+s;
};
el("modal").onclick=()=>el("modal").style.display="none";

buildPalette();
search();
})();
</script>

</body>
</html>
