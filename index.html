<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>V45ストラップカラー検索</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    /* ✅ タイトル：スマホで改行させない */
    
.title {
  white-space: nowrap;
  text-align: center;
}

.title::before,
.title::after {
  content: "★";
  color: #d4af37;
  margin: 0 8px;
}

    @media (max-width: 600px) {
      .title {
        font-size: 20px;
      }
    }

    input, select {
      padding: 8px;
      font-size: 16px;
      margin: 5px 0;
      width: 300px;
    }

    .label {
      font-weight: bold;
      margin-top: 10px;
    }

    .item {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px 0;
      display: flex;
      gap: 20px;
    }

    .item img {
      width: 150px;
      height: auto;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .item {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      input, select {
        width: 100%;
      }

      .item img {
        width: 80%;
        max-width: 250px;
      }
    }

    /* モーダル */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #modalImg {
      max-width: 90%;
      max-height: 90%;
      border: 5px solid #fff;
    }
  </style>

  <!-- ✅ data.js（キャッシュ対策） -->
  <script src="data.js?v=20260320"></script>
</head>

<body>

<h1 class="title">V45ストラップカラー検索</h1>

<div class="label">素材カテゴリ</div>
<select id="category">
  <option value="">指定なし</option>
  <option value="CROCORUBBER">CROCORUBBER</option>
  <option value="CALFRUBBER">CALFRUBBER</option>
  <option value="SUEDERUBBER">SUEDERUBBER</option>
  <option value="FABRICRUBBER">FABRICRUBBER</option>
  <option value="CAUCHU">CAUCHU</option>
</select>

<div class="label">素材1（表）の色系統</div>
<select id="groupMaterial1">
  <option value="">指定なし</option>
  <option value="黒系">黒系</option>
  <option value="青系">青系</option>
  <option value="白系">白系</option>
  <option value="黄系">黄系</option>
  <option value="赤系">赤系</option>
  <option value="オレンジ系">オレンジ系</option>
  <option value="緑系">緑系</option>
  <option value="パープル系">パープル系</option>
  <option value="茶系">茶系</option>
  <option value="グレー系">グレー系</option>
</select>

<div class="label">素材2（裏）の色系統</div>
<select id="groupMaterial2">
  <option value="">指定なし</option>
  <option value="黒系">黒系</option>
  <option value="青系">青系</option>
  <option value="白系">白系</option>
  <option value="黄系">黄系</option>
  <option value="赤系">赤系</option>
  <option value="オレンジ系">オレンジ系</option>
  <option value="緑系">緑系</option>
  <option value="パープル系">パープル系</option>
  <option value="茶系">茶系</option>
  <option value="グレー系">グレー系</option>
</select>

<div class="label">ステッチの色系統</div>
<select id="groupStitch">
  <option value="">指定なし</option>
  <option value="黒系">黒系</option>
  <option value="青系">青系</option>
  <option value="白系">白系</option>
  <option value="黄系">黄系</option>
  <option value="赤系">赤系</option>
  <option value="オレンジ系">オレンジ系</option>
  <option value="緑系">緑系</option>
  <option value="パープル系">パープル系</option>
  <option value="茶系">茶系</option>
  <option value="グレー系">グレー系</option>
  <option value="金系">金系</option>
</select>

<div class="label">部分一致検索（素材1・素材2・ステッチ・備考）</div>
<input id="search" placeholder="例：限定、マリナー用、在庫外 など">

<div id="result"></div>

<!-- モーダル -->
<div id="modal">
  <img id="modalImg">
</div>

<script>
(() => {
  const elSearch = document.getElementById("search");
  const elCategory = document.getElementById("category");
  const elMat1 = document.getElementById("groupMaterial1");
  const elMat2 = document.getElementById("groupMaterial2");
  const elStitch = document.getElementById("groupStitch");
  const elResult = document.getElementById("result");
  const elModal = document.getElementById("modal");
  const elModalImg = document.getElementById("modalImg");

  function updateStitchAvailability() {
    const isCauchu = elCategory.value === "CAUCHU";
    elStitch.disabled = isCauchu;
    if (isCauchu) elStitch.value = "";
  }

  function render(list) {
    elResult.innerHTML = "";

    list.forEach(item => {
      if (!item.画像 || !item.画像[0]) return;

      const div = document.createElement("div");
      div.className = "item";

      const img = document.createElement("img");
      img.src = "./images/" + item.画像[0];
      img.onclick = () => {
        elModalImg.src = img.src;
        elModal.style.display = "flex";
      };

      const stitchText =
        (item.カテゴリ === "CAUCHU" || !item.色.ステッチ)
          ? "なし"
          : item.色.ステッチ;

      const info = document.createElement("div");
      info.innerHTML = `
        <b>${item.品番}</b><br>
        素材1（表）：${item.色.素材1}<br>
        素材2（裏）：${item.色.素材2}<br>
        ステッチ：${stitchText}<br>
        ${item.備考 ? `備考：${item.備考}<br>` : ""}
      `;

      div.appendChild(img);
      div.appendChild(info);
      elResult.appendChild(div);
    });
  }

  function search() {
    let hit = DATA;

    if (elCategory.value)
      hit = hit.filter(i => i.カテゴリ === elCategory.value);

    if (elMat1.value)
      hit = hit.filter(i => i.色グループ.素材1 === elMat1.value);

    if (elMat2.value)
      hit = hit.filter(i => i.色グループ.素材2 === elMat2.value);

    if (elStitch.value)
      hit = hit.filter(i => i.色グループ.ステッチ === elStitch.value);

    if (elSearch.value.trim()) {
      const w = elSearch.value.trim();
      hit = hit.filter(i =>
        i.色.素材1.includes(w) ||
        i.色.素材2.includes(w) ||
        (i.色.ステッチ && i.色.ステッチ.includes(w)) ||
        (i.備考 && i.備考.includes(w))
      );
    }

    render(hit);
  }

  elSearch.oninput = search;
  elCategory.onchange = () => { updateStitchAvailability(); search(); };
  elMat1.onchange = search;
  elMat2.onchange = search;
  elStitch.onchange = search;

  elModal.onclick = () => elModal.style.display = "none";

  updateStitchAvailability();
  search();
})();
</script>

</body>
</html>
