<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V45ストラップカラー検索</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

/* ===== タイトル ===== */
.title {
  text-align: center;
  white-space: nowrap;
}
.title::before,
.title::after {
  content: "★";
  color: #d4af37;
  margin: 0 8px;
}

/* ===== 注意書き ===== */
.notice {
  margin: 10px 0 20px;
  padding: 10px;
  border: 1px solid #1e88e5;
  background: #e3f2fd;
  color: #1565c0;
  border-radius: 6px;
  font-size: 14px;
}

/* ===== UI ===== */
.label {
  font-weight: bold;
  margin-top: 14px;
}
input, select {
  padding: 8px;
  font-size: 16px;
  width: 300px;
  margin: 5px 0;
}

/* ===== カラーパレット ===== */
.palette {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 8px 0 16px;
}
.color-chip {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid #ccc;
  cursor: pointer;
  position: relative;
}
.color-chip.selected {
  border: 3px solid #000;
}
.color-chip.selected::after {
  content: "✓";
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

/* ===== 色定義 ===== */
.color-黒系 { background:#000; }
.color-青系 { background:#1976d2; }
.color-白系 { background:#fff; border:2px solid #999; }
.color-黄系 { background:#fdd835; }
.color-赤系 { background:#d32f2f; }
.color-オレンジ系 { background:#f57c00; }
.color-緑系 { background:#388e3c; }
.color-パープル系 { background:#7b1fa2; }
.color-茶系 { background:#6d4c41; }
.color-グレー系 { background:#9e9e9e; }
.color-金系 {
  background: linear-gradient(135deg,#f5d76e,#d4af37);
}

/* ===== パレット無効化 ===== */
.palette.disabled {
  pointer-events: none;
  opacity: 0.4;
}

/* ===== 結果 ===== */
.item {
  border: 1px solid #ccc;
  padding: 10px;
  margin: 10px 0;
  display: flex;
  gap: 20px;
}
.item img {
  width: 150px;
  cursor: pointer;
}

/* ===== モーダル ===== */
#modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}
#modalImg {
  max-width: 90%;
  max-height: 90%;
  border: 5px solid #fff;
}

@media (max-width:600px) {
  input, select { width:100%; }
  .item { flex-direction: column; align-items: center; }
}
</style>

<script src="data.js?v=20260320"></script>
</head>

<body>

<h1 class="title">V45ストラップカラー検索</h1>

<div class="notice">
  <div>注：在庫のないカラーがある場合があります</div>
  <div>色見本の参考にしてください</div>
</div>

<div class="label">素材カテゴリ</div>
<select id="category">
  <option value="">指定なし</option>
  <option value="CROCORUBBER">CROCORUBBER</option>
  <option value="CALFRUBBER">CALFRUBBER</option>
  <option value="SUEDERUBBER">SUEDERUBBER</option>
  <option value="FABRICRUBBER">FABRICRUBBER</option>
  <option value="CAUCHU">CAUCHU</option>
</select>

<div class="label">素材1（表）の色系統</div>
<div class="palette" id="paletteMaterial1"></div>
<input type="hidden" id="groupMaterial1">

<div class="label">素材2（裏）の色系統</div>
<div class="palette" id="paletteMaterial2"></div>
<input type="hidden" id="groupMaterial2">

<div class="label">素材2（裏）の素材名</div>
<select id="material2Name">
  <option value="">指定なし</option>
  <option value="CROCO">CROCO</option>
  <option value="CALF">CALF</option>
  <option value="CAUCHU">CAUCHU</option>
</select>

<div class="label">ステッチの色系統</div>
<div class="palette" id="paletteStitch"></div>
<input type="hidden" id="groupStitch">

<div class="label">部分一致検索</div>
<input id="search">

<div id="count"></div>
<div id="result"></div>

<div id="modal"><img id="modalImg"></div>

<script>
(() => {
  const COLORS_MAIN = ["黒系","青系","白系","黄系","赤系","オレンジ系","緑系","パープル系","茶系","グレー系"];
  const COLORS_STITCH = [...COLORS_MAIN,"金系"];
  const el = id => document.getElementById(id);

  function buildPalette(containerId, hiddenId, colors) {
    const box = el(containerId);
    const hidden = el(hiddenId);
    colors.forEach(c => {
      const d = document.createElement("div");
      d.className = `color-chip color-${c}`;
      d.title = c;
      d.onclick = () => {
        if (hidden.value === c) {
          hidden.value = "";
          d.classList.remove("selected");
        } else {
          hidden.value = c;
          [...box.children].forEach(x => x.classList.remove("selected"));
          d.classList.add("selected");
        }
        search();
      };
      box.appendChild(d);
    });
  }

  buildPalette("paletteMaterial1","groupMaterial1",COLORS_MAIN);
  buildPalette("paletteMaterial2","groupMaterial2",COLORS_MAIN);
  buildPalette("paletteStitch","groupStitch",COLORS_STITCH);

  function updateAvailabilityByCategory() {
    const isCauchu = el("category").value === "CAUCHU";
    const stitchPalette = el("paletteStitch");
    const stitchHidden = el("groupStitch");

    if (isCauchu) {
      stitchPalette.classList.add("disabled");
      stitchHidden.value = "";
      stitchPalette.querySelectorAll(".color-chip")
        .forEach(c => c.classList.remove("selected"));
    } else {
      stitchPalette.classList.remove("disabled");
    }
  }

  function search() {
    let hit = DATA;

    if (el("category").value)
      hit = hit.filter(i => i.カテゴリ === el("category").value);

    if (el("groupMaterial1").value)
      hit = hit.filter(i => i.色グループ.素材1 === el("groupMaterial1").value);

    if (el("groupMaterial2").value)
      hit = hit.filter(i => i.色グループ.素材2 === el("groupMaterial2").value);

    if (el("material2Name").value)
      hit = hit.filter(i => i.色.素材2.includes(el("material2Name").value));

    if (el("groupStitch").value)
      hit = hit.filter(i => i.色グループ.ステッチ === el("groupStitch").value);

    if (el("search").value)
      hit = hit.filter(i =>
        i.色.素材1.includes(el("search").value) ||
        i.色.素材2.includes(el("search").value) ||
        (i.色.ステッチ && i.色.ステッチ.includes(el("search").value)) ||
        (i.備考 && i.備考.includes(el("search").value))
      );

    el("count").textContent = `検索結果：${hit.length} 件`;
    el("result").innerHTML = hit.map(i => `
      <div class="item">
        <img src="./images/${i.画像[0]}" onclick="openModal('${i.画像[0]}')">
        <div>
          <b>${i.品番}</b><br>
          表：${i.色.素材1}<br>
          裏：${i.色.素材2}<br>
          ステッチ：${i.色.ステッチ || "なし"}
        </div>
      </div>
    `).join("");
  }

  window.openModal = src => {
    el("modalImg").src = "./images/" + src;
    el("modal").style.display = "flex";
  };
  el("modal").onclick = () => el("modal").style.display = "none";

  el("category").onchange = () => {
    updateAvailabilityByCategory();
    search();
  };
  document.querySelectorAll("select,input").forEach(e => e.onchange = search);

  updateAvailabilityByCategory();
  search();
})();
</script>

</body>
</html>
